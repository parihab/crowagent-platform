<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 2048 682"
     width="2048"
     height="682"
     role="img"
     aria-label="CrowAgent Platform logo">
  <title>CrowAgent™ Sustainability Platform</title>
  <desc>Updated horizontal logo lockup for CrowAgent™ Platform with icon, wordmark, subtitle and tagline.</desc>

  <defs>
    <radialGradient id="bgGlow" cx="20%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#123C86" stop-opacity="0.70"/>
      <stop offset="60%" stop-color="#062A63" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#031838" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2CE7DB"/>
      <stop offset="100%" stop-color="#11BFA8"/>
    </linearGradient>

    <linearGradient id="birdGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2CE7DB"/>
      <stop offset="100%" stop-color="#13BDA8"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="2048" height="682" fill="#041B3A"/>
  <rect width="2048" height="682" fill="url(#bgGlow)"/>

  <!-- icon block -->
  <g transform="translate(110, 25)" filter="url(#softShadow)">
    <polygon points="240,0 483,140 483,420 240,560 -3,420 -3,140"
             fill="none"
             stroke="url(#tealGrad)"
             stroke-width="10"/>
    <polygon points="240,34 455,158 455,402 240,526 25,402 25,158"
             fill="none"
             stroke="url(#tealGrad)"
             stroke-width="8"
             opacity="0.95"/>

    <g transform="translate(0, 8)">
      <ellipse cx="240" cy="270" rx="66" ry="90" fill="url(#birdGrad)"/>
      <circle cx="240" cy="150" r="48" fill="url(#birdGrad)"/>
      <path d="M278 140 L336 156 L280 184 Z" fill="#F2BE4E"/>
      <circle cx="256" cy="142" r="14" fill="#08284A"/>
      <circle cx="259" cy="139" r="5" fill="#FFFFFF" opacity="0.9"/>
      <path d="M190 282 C172 318 175 364 196 396 C196 372 214 350 232 334 Z" fill="#16C9B7"/>
      <path d="M290 282 C308 318 305 364 284 396 C284 372 266 350 248 334 Z" fill="#16C9B7"/>
      <path d="M240 356 C210 390 214 446 240 482 C266 446 270 390 240 356 Z" fill="#11BCA7"/>

      <path d="M116 442 C154 418 188 418 226 442 C264 466 298 466 336 442 C374 418 408 418 446 442"
            fill="none" stroke="url(#tealGrad)" stroke-width="14" stroke-linecap="round"/>
      <path d="M126 490 C162 468 194 468 230 490 C266 512 298 512 334 490 C370 468 402 468 438 490"
            fill="none" stroke="url(#tealGrad)" stroke-width="11" stroke-linecap="round" opacity="0.92"/>
      <path d="M138 536 C172 516 202 516 236 536 C270 556 300 556 334 536 C368 516 398 516 432 536"
            fill="none" stroke="url(#tealGrad)" stroke-width="9" stroke-linecap="round" opacity="0.86"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(620 155)" font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#softShadow)">
    <text x="0" y="125" font-size="248" font-weight="800" fill="#F5F8FF" letter-spacing="-4">Crow</text>
    <text x="566" y="125" font-size="248" font-weight="800" fill="url(#tealGrad)" letter-spacing="-4">Agent</text>
    <text x="1210" y="40" font-size="120" font-weight="800" fill="url(#tealGrad)">™</text>

    <text x="0" y="310" font-size="128" font-weight="500" fill="url(#tealGrad)">Sustainability Platform</text>
    <text x="0" y="438" font-size="78" font-weight="400" fill="#F5F8FF" opacity="0.95" letter-spacing="1">
      AI Powered, Physics Informed, Intelligent Decision
    </text>
  </g>
</svg>
